<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Wholesale Inquiry</title>
<!--
  Self-contained inquiry form that posts to YiTuo API.
  Drop this whole <section class="rfq-card"> + <script> block into any page on your site.
  Remember to:
    1) Replace API_KEY below with the key issued for your domain.
    2) Make sure your domain is whitelisted in api/data/api_keys.json (allowed_origins).
-->
<style>
    body{
        margin:0;
        background:#f5f5f5;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        color:#222;
    }
    .rfq-card{
        max-width:560px;
        margin:48px auto;
        background:#fff;
        border:1px solid #e5e5e5;
        border-radius:6px;
        padding:40px 48px;
        box-shadow:0 1px 3px rgba(0,0,0,.04);
    }
    .rfq-card h2{
        text-align:center;
        margin:0 0 28px;
        font-size:22px;
        font-weight:700;
    }
    .rfq-form .form-group{margin-bottom:18px;}
    .rfq-form label{
        display:block;
        font-size:14px;
        font-weight:600;
        margin-bottom:8px;
    }
    .rfq-form .req{color:#c0392b;}
    .rfq-form input,
    .rfq-form textarea{
        width:100%;
        box-sizing:border-box;
        padding:10px 12px;
        font-size:14px;
        font-family:inherit;
        border:1px solid #d0d0d0;
        border-radius:4px;
        background:#fff;
        outline:none;
        transition:border-color .15s;
    }
    .rfq-form input:focus,
    .rfq-form textarea:focus{border-color:#888;}
    .rfq-form textarea{resize:vertical;min-height:96px;}
    .rfq-form .btn-submit{
        width:100%;
        padding:14px;
        margin-top:10px;
        background:#111;
        color:#fff;
        border:none;
        border-radius:4px;
        font-size:15px;
        font-weight:700;
        letter-spacing:.3px;
        cursor:pointer;
        transition:background .15s;
    }
    .rfq-form .btn-submit:hover{background:#000;}
    .rfq-form .btn-submit:disabled{background:#666;cursor:not-allowed;}
    .rfq-msg{
        display:none;
        margin-top:14px;
        padding:10px 12px;
        font-size:14px;
        font-weight:600;
        border-radius:4px;
        text-align:center;
    }
    .rfq-msg.ok{display:block;color:#1e7d3a;background:#e6f4ea;}
    .rfq-msg.err{display:block;color:#a8201a;background:#fbeae5;}
</style>
</head>
<body>

<section class="rfq-card">
    <h2>Bulk Wholesale Inquiry</h2>
    <form id="rfqForm" class="rfq-form" novalidate-disabled>
        <div class="form-group">
            <label for="rfq-company">Company or Contact Person <span class="req">*</span></label>
            <input id="rfq-company" name="company" type="text" required placeholder="Your company or brand">
        </div>
        <div class="form-group">
            <label for="rfq-email">Business Email <span class="req">*</span></label>
            <input id="rfq-email" name="email" type="email" required placeholder="procurement@brand.com">
        </div>
        <div class="form-group">
            <label for="rfq-whatsapp">WhatsApp</label>
            <input id="rfq-whatsapp" name="whatsapp" type="text" placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
            <label for="rfq-requirements">Requirements (Width, Volume, Certifications)</label>
            <textarea id="rfq-requirements" name="requirements" rows="4" placeholder="Please type target width, expected yards, GRS/BCI request..."></textarea>
        </div>
        <button class="btn-submit" type="submit">Submit Factory RFQ</button>
        <p id="rfqMsg" class="rfq-msg"></p>
    </form>
</section>

<script>
(function(){
    /* ====== CONFIG: replace with your own values ====== */
    var API_URL = 'https://ontheporchtulsa.com/api/send_email.php';
    var API_KEY = 'aromadomushk_4Hk9PqL2mNvR7xC3yT8bZ1jW6sE0aF5d';
    var FORM_TYPE = 'Bulk Wholesale Inquiry';
    /* ================================================== */

    // ---- 1. Force English HTML5 validation messages ----
    function setEnMsg(input){
        var v = input.validity, msg = '';
        if(v.valueMissing){
            msg = 'Please fill out this field.';
        } else if(v.typeMismatch){
            if(input.type === 'email') msg = 'Please enter a valid email address.';
            else if(input.type === 'url') msg = 'Please enter a valid URL.';
            else msg = 'Please enter a valid value.';
        } else if(v.patternMismatch){
            msg = input.title || 'Please match the requested format.';
        } else if(v.tooShort){
            msg = 'Please lengthen this text to ' + input.minLength + ' characters or more.';
        } else if(v.tooLong){
            msg = 'Please shorten this text to ' + input.maxLength + ' characters or less.';
        } else if(v.rangeUnderflow){
            msg = 'Value must be greater than or equal to ' + input.min + '.';
        } else if(v.rangeOverflow){
            msg = 'Value must be less than or equal to ' + input.max + '.';
        } else if(v.stepMismatch || v.badInput){
            msg = 'Please enter a valid value.';
        }
        input.setCustomValidity(msg);
    }
    document.addEventListener('invalid', function(e){
        var t = e.target;
        if(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')){
            setEnMsg(t);
        }
    }, true);
    document.addEventListener('input',  function(e){ if(e.target.setCustomValidity) e.target.setCustomValidity(''); }, true);
    document.addEventListener('change', function(e){ if(e.target.setCustomValidity) e.target.setCustomValidity(''); }, true);

    // ---- 2. Submit handler ----
    var form = document.getElementById('rfqForm');
    var btn  = form.querySelector('.btn-submit');
    var msg  = document.getElementById('rfqMsg');

    form.addEventListener('submit', function(e){
        e.preventDefault();

        var company      = form.company.value.trim();
        var email        = form.email.value.trim();
        var whatsapp     = form.whatsapp.value.trim();
        var requirements = form.requirements.value.trim();

        // Build API payload (see api/API_USAGE.md)
        var payload = {
            form_type: FORM_TYPE,
            page_url:  location.href,
            name:      company,                     // use company as contact name
            email:     email,
            company:   company,
            message:   requirements || '(no extra requirements provided)',
            fields: {
                'WhatsApp': whatsapp || '(not provided)'
            }
        };

        msg.className = 'rfq-msg';
        msg.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Sending...';

        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key':    API_KEY
            },
            body: JSON.stringify(payload)
        })
        .then(function(res){ return res.json().then(function(d){ return {ok: res.ok, data: d}; }); })
        .then(function(r){
            if(r.ok && r.data && r.data.status === 'success'){
                msg.className = 'rfq-msg ok';
                msg.textContent = r.data.message || 'Thank you! Your inquiry has been sent successfully.';
                form.reset();
            } else {
                msg.className = 'rfq-msg err';
                msg.textContent = (r.data && r.data.message) || 'Failed to send inquiry. Please try again.';
            }
        })
        .catch(function(){
            msg.className = 'rfq-msg err';
            msg.textContent = 'A network error occurred. Please try again later.';
        })
        .finally(function(){
            btn.disabled = false;
            btn.textContent = 'Submit Factory RFQ';
        });
    });
})();
</script>

</body>
</html>
